server:
  http_port: 9090
  command_timeout_seconds: 15

logging:
  enabled: true
  file: "logs/tm1executecommandservice.log"
  level: "info"
  max_size: 10
  max_backups: 3
  max_age: 28

security:
  authentication:
    enabled: false
    api_key: ""                        # Must be >= 32 characters when enabled

  ip_whitelist:
    enabled: true
    allowed_ips:
      - "127.0.0.1"                   # IPv4 localhost
      - "::1"                          # IPv6 localhost
      - "192.168.1.0/24"              # Local network range
      - "10.0.0.0/8"                  # Private network range
      - "3.224.15.70"                  # IBM PA US-East egress IP
    trust_proxy: false                 # Enable if behind a load balancer
    trusted_proxies: []                # IPs of your load balancer(s)

  command_policy:
    enabled: false                     # Enable in production deployments
    allowed_extensions:
      - ".ps1"
      - ".py"
      - ".bat"
      - ".cmd"
    allowed_directories: []            # Configure script directories when enabled
    # Example:
    # allowed_directories:
    #   - path: "C:\\Scripts\\TM1"
    #     include_subdirs: true

  rate_limit:
    enabled: false
    requests_per_minute: 60

  https:
    enabled: false
    port: 9443
    cert_file: "cert/server.crt"
    key_file: "cert/server.key"
